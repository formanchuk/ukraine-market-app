            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

            if (!dateStr) return '';

        // ========== ФОТО ==========
        function addPhotoInput() {
            if (selectedPhotos.length >= 15) {
                showMessage('Максимум 15 фото', true);
                return;
            }
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        selectedPhotos.push(ev.target.result);
                        renderPhotoList();
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };
            input.click();
        }
        
        function renderPhotoList() {
            const container = document.getElementById('photoList');
            container.innerHTML = selectedPhotos.map((photo, idx) => `
                <div class="photo-item" style="background-image: url('${photo}')">
                    <div class="photo-remove" onclick="removePhoto(${idx})">×</div>
                </div>
            `).join('');
            if (selectedPhotos.length < 15) {
                container.innerHTML += `<div class="add-photo-btn" onclick="addPhotoInput()">+</div>`;
            }
        }
        
        function removePhoto(idx) {
            selectedPhotos.splice(idx, 1);
            renderPhotoList();
        }
        
        async function uploadPhotos() {
            const urls = [];
            for (const photo of selectedPhotos) {
                try {
                    const response = await fetch('https://api.imgur.com/3/image', {
                        method: 'POST',
                        headers: { 'Authorization': 'Client-ID 46e2a4d6f0c5a9b' },
                        body: new URLSearchParams({ image: photo.split(',')[1] })
                    });
                    const data = await response.json();
                    if (data.success) urls.push(data.data.link);
                } catch(e) { console.error(e); }
            }
            return urls.join(',');
        }

        }
        
        async function openResumeDetail(id) {
            const item = resumesData.find(r => r.id === id);
            if (!item) return;
            const user = await getUserById(item.user_id);
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('detailContent');
            content.innerHTML = `
                <div class="detail-title">${escapeHtml(item.specialty)}</div>
                <div class="detail-price">💰 ${escapeHtml(item.salary)} грн</div>
                <div class="detail-city">📍 ${escapeHtml(item.city || 'не вказано')}</div>
                <div class="detail-desc">📝 Досвід: ${escapeHtml(item.experience || 'не вказано')}</div>
                <div class="detail-desc">🛠️ Навички: ${escapeHtml(item.skills || 'не вказано')}</div>
                <div class="detail-phone">📱 Телефон: ${escapeHtml(item.phone || user?.phone || 'не вказано')}</div>
                <button class="contact-btn" onclick="contactSeller('${escapeHtml(item.phone || user?.phone)}')">💬 Запросити</button>
            `;
            modal.style.display = 'flex';
        }
        
        function contactSeller(phone) {
            if (phone) {
                tg.showPopup({
                    title: 'Контактні дані',
                    message: `Телефон: ${phone}`,
                    buttons: [{ type: 'default', text: 'OK' }]
                });
            } else {
                showMessage('Номер телефону не вказано', true);
            }
        }
        
        function closeDetailModal() {
            document.getElementById('detailModal').style.display = 'none';
        }
        
        async function getUserById(userId) {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/users?id=eq.${userId}&select=*`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const data = await response.json();
                return data[0] || null;
            } catch(e) { return null; }
        }
        
        function showAddModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { 
            document.getElementById('addModal').style.display = 'none';
            selectedPhotos = [];
            renderPhotoList();
        }
        
        function switchAddTab(tab) {
            currentAddTab = tab;
            document.getElementById('addGoodsForm').style.display = tab === 'goods' ? 'block' : 'none';
            document.getElementById('addJobForm').style.display = tab === 'job' ? 'block' : 'none';
            document.getElementById('addResumeForm').style.display = tab === 'resume' ? 'block' : 'none';
        }
        
        async function submitGoods() {
            const title = document.getElementById('goodsTitle').value;
            const category = document.getElementById('goodsCategory').value;
            const price = document.getElementById('goodsPrice').value;
            const city = document.getElementById('goodsCity').value;
            const phone = document.getElementById('goodsPhone').value || getPhone();
            const desc = document.getElementById('goodsDesc').value;
            if (!title || !price) { showMessage('Заповніть назву та ціну', true); return; }
            if (!phone) { showMessage('Введіть телефон для зв\'язку', true); return; }
            
            const photoUrls = await uploadPhotos();
            const ok = await addGoods(title, category, price, city, phone, desc, photoUrls);
            if (ok) {
                showMessage('✅ Опубліковано!');
                closeModal();
                loadGoods();
                document.getElementById('goodsTitle').value = '';
                document.getElementById('goodsPrice').value = '';
                document.getElementById('goodsCity').value = '';
                document.getElementById('goodsDesc').value = '';
                document.getElementById('goodsPhone').value = '';
                selectedPhotos = [];
                renderPhotoList();
            } else {
                showMessage('❌ Помилка', true);
            }
        }
        
        async function submitJob() {
            const title = document.getElementById('jobTitle').value;
            const category = document.getElementById('jobCategory').value;
            const salary = document.getElementById('jobSalary').value;
            const city = document.getElementById('jobCity').value;
            const phone = document.getElementById('jobPhone').value || getPhone();
            const schedule = document.getElementById('jobSchedule').value;
            const desc = document.getElementById('jobDesc').value;
            if (!title) { showMessage('Заповніть назву', true); return; }
            if (!phone) { showMessage('Введіть телефон для зв\'язку', true); return; }
            const ok = await addJob(title, category, salary, city, phone, schedule, desc);
            showMessage(ok ? '✅ Опубліковано!' : '❌ Помилка', !ok);
            if (ok) { closeModal(); loadJobs(); }
        }
        
        async function submitResume() {
            const specialty = document.getElementById('resumeSpecialty').value;
            const experience = document.getElementById('resumeExperience').value;
            const skills = document.getElementById('resumeSkills').value;
            const city = document.getElementById('resumeCity').value;
            const salary = document.getElementById('resumeSalary').value;
            const phone = document.getElementById('resumePhone').value || getPhone();
            if (!specialty) { showMessage('Заповніть спеціальність', true); return; }
            if (!phone) { showMessage('Введіть телефон для зв\'язку', true); return; }
            const ok = await addResume(specialty, experience, skills, city, salary, phone);
            showMessage(ok ? '✅ Опубліковано!' : '❌ Помилка', !ok);
            if (ok) { closeModal(); loadResumes(); }
        }
        
        // ========== INIT ==========
        document.getElementById('bottomNav').addEventListener('click', (e) => {
            const btn = e.target.closest('.nav-item');
            if (!btn) return;
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            const page = btn.dataset.page;
            if (page === 'home') { currentPage = 'home'; renderHome(); }
            else if (page === 'goods') { currentPage = 'goods'; currentCategory = null; loadGoods(); }
            else if (page === 'jobs') { currentPage = 'jobs'; loadJobs(); loadResumes(); renderJobsList(); }
            else if (page === 'profile') { currentPage = 'profile'; renderProfile(); }
        });
        
        loadUserProfile();
        renderHome();
        document.querySelector('.nav-item[data-page="home"]').classList.add('active');
        loadGoods();
        loadJobs();
        loadResumes();
        
        // Глобальні для onclick
        window.deleteGoodsWithFeedback = deleteGoodsWithFeedback;
        window.archiveGoodsWithFeedback = archiveGoodsWithFeedback;
        window.markAsSoldWithFeedback = markAsSoldWithFeedback;
        window.showAddModal = showAddModal;
        window.closeDetailModal = closeDetailModal;
        window.goBack = goBack;
        window.openGoodsDetail = openGoodsDetail;
        window.openJobDetail = openJobDetail;
        window.openResumeDetail = openResumeDetail;
        window.contactSeller = contactSeller;
        window.editGoods = editGoods;
        window.savePhone = savePhone;
        window.switchProfileTab = switchProfileTab;
        window.switchJobsTab = switchJobsTab;
        window.goToAllGoods = goToAllGoods;
        window.goToJobs = goToJobs;
        window.selectHomeCategory = selectHomeCategory;
        window.searchGoods = searchGoods;
        window.submitGoods = submitGoods;
        window.submitJob = submitJob;
        window.submitResume = submitResume;
        window.switchAddTab = switchAddTab;
        window.closeModal = closeModal;
        window.closeBottomSheet = closeBottomSheet;
        window.addPhotoInput = addPhotoInput;
        window.removePhoto = removePhoto;
    </script>
</body>
</html>
